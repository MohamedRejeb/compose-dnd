name: Java CI with Gradle

on:
    push:
        branches: [ "main" ]
    pull_request:
        branches: [ "main" ]
    workflow_call:

permissions:
    contents: write

jobs:
    build:
        runs-on: macos-latest

        steps:
            - uses: actions/checkout@v6
              with:
                  ref: ${{ github.head_ref }}

            - name: Validate Gradle Wrapper
              uses: gradle/wrapper-validation-action@v3

            - uses: actions/cache@v5
              with:
                  path: |
                      ~/.konan
                  key: ${{ runner.os }}-${{ hashFiles('**/.lock') }}

            - name: Set up JDK 17
              uses: actions/setup-java@v5
              with:
                  java-version: '17'
                  distribution: 'zulu'

            - name: Setup gradle
              uses: gradle/actions/setup-gradle@v5

            - name: Spotless apply
              run: ./gradlew spotlessApply

            - name: Commit formatting changes
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add -A
                  git diff --cached --quiet || git commit -m "style: apply spotless formatting"
                  git push

            - name: Gradle test
              run: ./gradlew allTests

    # Runs on Linux: macOS runners are Apple Silicon without nested
    # virtualization, so the emulator cannot boot there.
    instrumented-tests:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6
              with:
                  ref: ${{ github.head_ref }}

            - name: Enable KVM group perms
              run: |
                  echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
                  sudo udevadm control --reload-rules
                  sudo udevadm trigger --name-match=kvm

            - name: Set up JDK 17
              uses: actions/setup-java@v5
              with:
                  java-version: '17'
                  distribution: 'zulu'

            - name: Setup gradle
              uses: gradle/actions/setup-gradle@v5

            - name: Android instrumented tests
              uses: reactivecircus/android-emulator-runner@v2
              with:
                  api-level: 34
                  arch: x86_64
                  disable-animations: true
                  script: ./gradlew :compose-dnd:connectedDebugAndroidTest

    deploy:
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        needs: [ build, instrumented-tests ]
        runs-on: macos-latest
        steps:
            - uses: actions/checkout@v6
            - name: Set up JDK 17
              uses: actions/setup-java@v5
              with:
                  java-version: '17'
                  distribution: 'zulu'

            - name: Setup Gradle
              uses: gradle/actions/setup-gradle@v5

            - name: Deploy snapshot
              env:
                  VERSION: 0.5.0-SNAPSHOT
                  ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.OSSRH_USERNAME }}
                  ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.OSSRH_PASSWORD }}
                  ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.OSSRH_GPG_SECRET_KEY_ID }}
                  ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.OSSRH_GPG_SECRET_KEY }}
                  ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.OSSRH_GPG_SECRET_KEY_PASSWORD }}
              run: ./gradlew publish
